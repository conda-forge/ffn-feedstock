{% set name = "ffn" %}
{% set version = "1.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c9382061a9f71fa0e896f973b6cbce4a29185c5809be8078ffb8c8c67ff86a37

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - decorator >=5.0.7
    - future >=0.15
    - matplotlib-base >=1
    - numpy >=1.5
    - pandas >=0.19
    - scikit-learn >=0.15
    - scipy >=0.15
    - tabulate >=0.7.5
    - yfinance >=0.2
    - python >={{ python_min }}

test:
  imports:
    - ffn
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://github.com/pmorissette/ffn
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: ffn - a financial function library for Python
  description: |
    ffn - a financial function library for Python
  doc_url: http://pmorissette.github.io/ffn/
  dev_url: https://github.com/pmorissette/ffn

extra:
  recipe-maintainers:
    - timkpaine
